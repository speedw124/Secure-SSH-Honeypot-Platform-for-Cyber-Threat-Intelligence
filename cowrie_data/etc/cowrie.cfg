[honeypot]
hostname = db-server-backup
auth_class = UserDB
userdb = /cowrie/cowrie-git/etc/userdb.txt
honeyfs = /cowrie/cowrie-git/honeyfs
filesystem = /cowrie/cowrie-git/share/cowrie/fs.pickle
contents_path = /cowrie/cowrie-git/honeyfs

[honeyfs]
enabled = true


[ssh]
enabled = true
version = SSH-2.0-OpenSSH_7.2p1 Ubuntu-4ubuntu2.8
listen_port = 2222
root_login_without_password = false
auth_methods = password

[telnet]
enabled = false
listen_port = 2223

[output_jsonlog]
enabled = true
logfile = /var/log/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = /var/log/cowrie/cowrie.log
