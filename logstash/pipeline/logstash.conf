input {
  beats {
    port => 5044
  }
}

filter {
  if [type] == "cowrie" {
    # The JSON parsing is handled by Filebeat with json.keys_under_root: true
    # and json.overwrite_keys: true, so the 'json' filter here is redundant
    # and can be removed to prevent potential parsing errors if 'message' field
    # no longer contains the full JSON string.
    
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      # 'message' field can be removed as its content is now at the root level
      # 'log.file.path' is also good to remove for cleanup
      remove_field => ["message", "log.file.path"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "cowrie-%{+YYYY.MM.dd}"
  }
}
